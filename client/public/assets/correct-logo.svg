<?xml version="1.0" encoding="UTF-8"?>
<svg width="250" height="60" viewBox="0 0 250 60" xmlns="http://www.w3.org/2000/svg">
  <!-- Main background -->
  <rect width="250" height="60" fill="white" opacity="0"/>
  
  <!-- Shield Icon with line chart -->
  <g transform="translate(5, 5)">
    <!-- Shield shape -->
    <path d="M30,1 C45,1 45,1 45,15 L45,30 C45,45 30,50 25,50 C20,50 5,45 5,30 L5,15 C5,1 15,1 30,1 Z" 
          fill="white" stroke="#002968" stroke-width="2"/>
    
    <!-- Line chart with 'Y' shaped graph -->
    <path d="M15,35 L20,25 L25,35 M20,25 L30,15" 
          stroke="#002968" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Text: Better Capital Solutions -->
  <g transform="translate(60, 0)">
    <!-- "Better Capital" in serif font -->
    <text x="0" y="25" font-family="'Times New Roman', serif" font-weight="700" font-size="22" fill="#002968">Better Capital</text>
    
    <!-- "SOLUTIONS" in gray sans-serif -->
    <text x="0" y="45" font-family="Arial, sans-serif" font-weight="400" font-size="15" fill="#4A5568">SOLUTIONS</text>
  </g>
</svg>