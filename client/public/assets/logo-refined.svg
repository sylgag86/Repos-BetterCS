<?xml version="1.0" encoding="UTF-8"?>
<svg width="280" height="70" viewBox="0 0 280 70" xmlns="http://www.w3.org/2000/svg">
  <!-- Main background -->
  <rect width="280" height="70" fill="white" opacity="0"/>
  
  <!-- Text: Better Capital Solutions with refined typography -->
  <g>
    <!-- "Better Capital" in a refined serif font style -->
    <text x="10" y="32" font-family="Georgia, serif" font-weight="700" font-size="26" fill="#003366" letter-spacing="0.5">Better Capital</text>
    
    <!-- "Solutions" in a complementary sans-serif font -->
    <text x="10" y="54" font-family="'Arial', sans-serif" font-weight="500" font-size="18" fill="#555555" letter-spacing="1">SOLUTIONS</text>
  </g>
  
  <!-- Professional Financial Icon -->
  <g transform="translate(230, 10)">
    <!-- Subtle shield/badge shape for trust -->
    <path d="M20,5 L35,5 C38,5 40,7 40,10 L40,35 C40,40 35,45 20,50 C5,45 0,40 0,35 L0,10 C0,7 2,5 5,5 L20,5 Z" 
          fill="#f8f9fa" stroke="#003366" stroke-width="1.5"/>
    
    <!-- Stylized graph line showing growth -->
    <path d="M8,37 L15,28 L22,32 L32,15" 
          stroke="#003366" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Dollar sign that's professional but not overpowering -->
    <path d="M20,12 L20,42 M15,17 L25,17 M15,37 L25,37" 
          stroke="#003366" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>