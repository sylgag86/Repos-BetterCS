<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="50" viewBox="0 0 200 50" xmlns="http://www.w3.org/2000/svg">
  <!-- Main background (transparent) -->
  <rect width="200" height="50" fill="none"/>
  
  <!-- Logo Group -->
  <g>
    <!-- Shield outline -->
    <path d="M10,5 L25,5 C30,5 35,5 35,10 L35,30 C35,35 25,40 20,45 C15,40 5,35 5,30 L5,10 C5,5 10,5 15,5 Z" 
          fill="white" stroke="#002968" stroke-width="2" />
    
    <!-- Line chart inside shield -->
    <path d="M13,30 L18,18 L22,27 L28,15" 
          stroke="#002968" stroke-width="1.5" fill="none" />
    
    <!-- Dots for chart -->
    <circle cx="13" cy="30" r="1" fill="#002968" />
    <circle cx="18" cy="18" r="1" fill="#002968" />
    <circle cx="22" cy="27" r="1" fill="#002968" />
    <circle cx="28" cy="15" r="1" fill="#002968" />
  </g>
  
  <!-- Text elements -->
  <g>
    <!-- "Better Capital" text -->
    <text x="45" y="22" font-family="serif" font-size="15" font-weight="bold" fill="#002968">Better Capital</text>
    
    <!-- "SOLUTIONS" text -->
    <text x="45" y="38" font-family="sans-serif" font-size="11" fill="#4A5568">SOLUTIONS</text>
  </g>
</svg>